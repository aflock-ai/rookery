apiVersion: cilock.detection/v0.1
name: jenkins
description: "Captures Jenkins runner context (job name, node, build ID, URL) when running inside a Jenkins pipeline."

category: [ci-context]

upstream:
  name: Jenkins
  source: "https://github.com/jenkinsci/jenkins"
  license: MIT
  vendor: Jenkins Project / CD Foundation

pre:
  match:
    env_set: JENKINS_URL

llm_hints:
  on_match: "Jenkins runner context captured (job, node, build id)."

contract:
  tier: foundation
  predicate_type: https://aflock.ai/attestations/jenkins/v0.1
  run_type: prematerial
  stability:
    level: stable
    notes: "Output is a fixed struct populated from Jenkins-injected environment variables (BUILD_ID, BUILD_NUMBER, BUILD_TAG, BUILD_URL, EXECUTOR_NUMBER, JAVA_HOME, JENKINS_URL, JOB_NAME, NODE_NAME, WORKSPACE). Field set is deterministic; values vary per run but there are no timestamps or non-deterministic ordering. Attest returns ErrNotJenkins when JENKINS_URL is unset."
  subjects:
    - prefix: "pipelineurl:"
      description: "the BUILD_URL of the Jenkins pipeline run (sha256 of the URL string)"
    - prefix: "jenkinsurl:"
      description: "the JENKINS_URL controller base URL (sha256 of the URL string)"
  backref_subjects:
    - "pipelineurl:"
  schema_required: true
  credentials: []
