apiVersion: cilock.detection/v0.1
name: trivy
description: "Captures Trivy vulnerability and misconfiguration scan results."

category: [vulnerability-scan]

upstream:
  name: Trivy
  source: "https://github.com/aquasecurity/trivy"
  license: Apache-2.0
  vendor: Aqua Security

# Trivy output is what we sign; we trust trivy to enumerate findings.
recommended_trace: "off"

# Pre-gate match: user invoked trivy directly (cilock plan -- trivy image foo).
# This is a hint that trivy will fire — the actual attestation happens
# post-execute when the scan output is on disk.
pre:
  match:
    argv_prefix: ["trivy"]

post:
  # Trivy's output filename is user-chosen (trivy's own --help shows
  # `--output result.json` as the example). product_glob can't reliably
  # detect arbitrary user-chosen names, so we trust exec_observed as
  # the primary signal — if the user invoked trivy, the attestation
  # captures it. The product_glob fallback only covers the conventional
  # names users sometimes pick.
  match:
    any_of:
      - exec_observed:
          argv_prefix: ["trivy"]
      - product_glob: ["trivy-results.json", "**/trivy-results.json", "trivy-report.json", "**/trivy-report.json", "trivy.json", "**/trivy.json"]

llm_hints:
  on_match: "Trivy scan captured. Vulnerabilities, misconfigurations, and secrets findings preserved."

# Output contract — proven by the verification loop (testkit + fixtures + CI).
# See testdata/fixtures/. The trivy attestor is a Subjecter only (no Materials/
# Products/Export): it signs the scan report and fans out subjects per artifact
# and per CVE / misconfig resource.
contract:
  predicate_type: https://aflock.ai/attestations/trivy/v0.1
  run_type: postproduct
  tier: recommended
  stability:
    level: best-effort
    notes: "Trivy JSON output is structurally stable for a pinned tool version + DB; finding ordering and scan timestamps vary."
    volatile_fields:
      - "CreatedAt"
      - "Results[].Vulnerabilities[].LastModifiedDate"
      - "Results[].Vulnerabilities[].PublishedDate"
  credentials: []
  subjects:
    - prefix: "trivy:artifact:"
      description: "the scanned artifact (image ref or filesystem path)"
    - prefix: "trivy:cve:"
      description: "each unique vulnerability id across failed findings"
    - prefix: "trivy:resource:"
      description: "each misconfiguration resource id across failed findings"
  # BackReffer: the attestor backrefs its SCAN TARGET. backrefs: is the
  # complete BackRefs() declaration — imagedigest:/imagereference: (from
  # Metadata.RepoDigests/RepoTags) are NOT subjects and live only here;
  # backref_subjects keeps the subjects-constrained subset (the
  # trivy:artifact: fallback) for the legacy ⊆-subjects view.
  backrefs:
    - prefix: "imagedigest:"
      description: "scan-target image digest from Metadata.RepoDigests (bare hex, matches the docker attestor's imagedigest subjects so shared edges connect)"
    - prefix: "imagereference:"
      description: "scan-target image reference from Metadata.RepoTags (repo:tag, sha256-of-string, matching docker)"
    - prefix: "trivy:artifact:"
      description: "fallback anchor for filesystem/repo scans when no image metadata is present"
  backref_subjects:
    - "trivy:artifact:"
  schema_required: true
  validated_invocation:
    tool: trivy
    argv: ["trivy", "fs", "--format", "json", "--output", "trivy-results.json", "."]
    step: trivy-scan
    attestations: ["trivy", "environment"]
  fixtures:
    - name: fs-vuln
      role: canonical
