apiVersion: cilock.detection/v0.1
name: sarif
description: "Captures SARIF (Static Analysis Results Interchange Format) reports produced by scanners (CodeQL, Semgrep, Brakeman, etc.)."

# No category: SARIF is a format wrapper used by many scanner kinds
# (SAST, DAST, IaC scan, secret scan, code review). Step intent comes
# from the tool that emitted the file, not the format. See
# docs/lexicon-v1.md composition rule 6.

upstream:
  name: SARIF (Static Analysis Results Interchange Format)
  source: "https://docs.oasis-open.org/sarif/sarif/v2.1.0/sarif-v2.1.0.html"
  license: OASIS
  vendor: OASIS / OASIS SARIF TC
  format_only: true

recommended_trace: "off"

post:
  match:
    product_glob: ["*.sarif", "**/*.sarif", "*.sarif.json", "**/*.sarif.json"]

llm_hints:
  on_match: "SARIF report captured. Scanner findings preserved verbatim for downstream policy evaluation."

contract:
  tier: recommended
  predicate_type: https://aflock.ai/attestations/sarif/v0.1
  run_type: postproduct
  stability:
    level: versioned-schema
    tool_schema_version: "2.1.0"
    notes: "The attestor records the SARIF report bytes verbatim as json.RawMessage (byte-identical to the input file), plus the relative file path and the product DigestSet copied from the product attestor. The attestor itself introduces no re-encoding, timestamps, or re-ordering — its added data is deterministic for a fixed input. Volatile fields live in the wrapped SARIF body produced by the upstream scanner (per-run scan timestamps under runs[].invocations[], finding detection times, and finding ordering), not in attestor-added data. Wire format is SARIF 2.1.0 (OASIS SARIF TC)."
    volatile_fields:
      - "runs[].invocations[].startTimeUtc"
      - "runs[].invocations[].endTimeUtc"
      - "runs[].results[].provenance.firstDetectionTimeUtc"
      - "runs[].results[].provenance.lastDetectionTimeUtc"
  schema_required: true
  credentials: []
  fixtures:
    - name: gosec
      role: canonical
