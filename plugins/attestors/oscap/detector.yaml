apiVersion: cilock.detection/v0.1
name: oscap
description: "Captures OpenSCAP compliance / vulnerability scan results."

category: [compliance-scan]

upstream:
  name: OpenSCAP
  source: "https://github.com/OpenSCAP/openscap"
  license: LGPL-2.1-or-later
  vendor: Red Hat / OpenSCAP project

recommended_trace: "off"

pre:
  match:
    argv_prefix: ["oscap"]

post:
  match:
    any_of:
      - exec_observed:
          argv_prefix: ["oscap"]
      - product_glob: ["oscap*.xml", "**/oscap*.xml", "oscap*.html", "**/oscap*.html"]

llm_hints:
  on_match: "OpenSCAP results captured. SCAP rule outcomes preserved."

contract:
  tier: extended
  predicate_type: https://aflock.ai/attestations/oscap/v0.1
  run_type: postproduct
  stability:
    level: stable
    notes: >-
      Output is a deterministic parse of the XCCDF/ARF XML product:
      benchmark id, profile, target system, pass/fail/notapplicable/error
      counts, and the list of failed rules in document order. No timestamps,
      hostnames, or wall-clock values are injected by the attestor; everything
      is derived from the scanned report file. Subject keys/digests are stable
      for a given input report.
    volatile_fields: []
  subjects:
    - prefix: "profile:"
      description: "the XCCDF profile id that was evaluated (TestResult/profile/@idref)"
    - prefix: "host:"
      description: "the target system that was scanned (TestResult/target)"
    - prefix: "benchmark:"
      description: "the XCCDF benchmark document id (Benchmark/@id)"
  schema_required: true
  credentials: []
  fixtures:
    - name: almalinux9-standard
      role: canonical
