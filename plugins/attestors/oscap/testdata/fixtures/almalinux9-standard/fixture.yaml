schema_version: "0.1"
attestor: oscap
description: >-
  OpenSCAP XCCDF evaluation of the AlmaLinux 9 SCAP Security Guide datastream
  against the ANSSI-BP-028 (minimal) profile — derived from a REAL `oscap xccdf
  eval` run inside an almalinux:9 container under cilock (14 pass / 1 fail / 24
  n-a of the selected rules; benchmark ALMALINUX-9). The committed results XML is
  TRIMMED for size: the <Rule>/<Group>/<Profile>/<Value> definitions (SSG prose
  the postproduct attestor never reads) are stripped; all 1530 real <rule-result>
  entries are kept, so the parsed predicate is byte-identical to the full scan.
  Original recording was ~18MB; trimmed to ~0.4MB.
setup:
  mode: product
  input: oscap-results.xml   # trimmed XCCDF results XML — the hermetic replay source
  mime_type: application/xml
# Provenance of the original real run (documented, NOT harness-enforced). The
# committed XML is a size-trimmed derivative, so the original cilock-signed
# attestation no longer byte-matches it; it was removed rather than left as
# orphaned signed evidence for a file that is no longer present. To regenerate
# the full scan AND its signed evidence, re-run ./record.sh (builds the
# oscap-runner image from recording-input/Dockerfile and re-runs under cilock):
#   tool:          oscap 1.3.13  (recorded_with cilock, 2026-05-29)
#   binary_sha256: 7ef28eded784c97af5b7eceacef99b2ad6a42bf9e5108c4b6a8f89646b0e7ed7
#   argv:          docker run --rm -v "$PWD":/work -w /work oscap-runner \
#                    oscap xccdf eval \
#                    --profile xccdf_org.ssgproject.content_profile_anssi_bp28_minimal \
#                    --results oscap-results.xml \
#                    /usr/share/xml/scap/ssg/content/ssg-almalinux9-ds.xml
expect:
  predicate_type: https://aflock.ai/attestations/oscap/v0.1
  run_type: postproduct
  subjects:
    match: prefix
    keys:
      - "profile:"
      - "host:"
      - "benchmark:"
# No redact list: the oscap attestor's predicate is a deterministic parse of the
# committed (trimmed) XCCDF results XML — reportFile is the relative product
# basename, and targetSystem / the pass·fail·n-a counts / the failed-rule list
# are all derived from the same committed bytes, so two replays are identical.
