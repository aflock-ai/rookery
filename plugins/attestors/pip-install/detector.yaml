apiVersion: cilock.detection/v0.1
name: pip-install
description: "Captures Python package installation provenance (package name, version, resolved wheel) when `pip install` is invoked."

category: [dependency-resolve]

upstream:
  name: pip
  source: "https://github.com/pypa/pip"
  license: MIT
  vendor: Python Packaging Authority

# Threat model: pip install fetches packages over the network and writes
# them to site-packages. We want to capture which URLs were resolved,
# which wheel digests landed on disk. Full trace.
recommended_trace: full

pre:
  match:
    any_of:
      - argv_prefix: ["pip", "install"]
      - argv_prefix: ["pip3", "install"]

post:
  match:
    any_of:
      - exec_observed:
          argv_prefix: ["pip", "install"]
      - exec_observed:
          argv_prefix: ["pip3", "install"]

llm_hints:
  on_match: "pip install captured. Package coordinates, version pins, and wheel digests preserved."

contract:
  tier: extended
  predicate_type: https://aflock.ai/attestations/pip-install/v0.1
  run_type: postproduct
  stability:
    level: best-effort
    notes: >-
      Package list/versions come from `pip list`/`pip show` (deterministic,
      name-sorted) but install paths (Location), discovered file paths, and
      pickle global-ref ordering vary by environment. PEP740Verification is
      populated from live unauthenticated PyPI HTTP calls, so its contents
      depend on network availability and PyPI's current provenance state and
      may be empty or differ between runs. No wall-clock timestamps are emitted.
    volatile_fields:
      - packages[].location
      - setupPyAnalysis[].path
      - pyprojectAnalysis
      - installedFileAnalysis.pickleFiles
      - installedFileAnalysis.pickleAnalysis
      - installedFileAnalysis.pthFiles
      - installedFileAnalysis.totalPyFiles
      - pep740Verification
  subjects:
    - prefix: "pip://"
      description: >-
        One subject per installed package, keyed pip://<name>@<version>; the
        digest is sha256 of the literal "<name>==<version>" string, not the
        wheel artifact.
  schema_required: true
  credentials: []
