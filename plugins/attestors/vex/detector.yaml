apiVersion: cilock.detection/v0.1
name: vex
description: "Captures OpenVEX documents asserting vulnerability statuses (affected, not_affected, fixed, under_investigation)."

# No category: VEX is a format that can carry both consumption
# (vex-consume) and disclosure (vulnerability-disclosure) intent. Step
# intent comes from the producing context, not the format. See
# docs/lexicon-v1.md composition rule 6.

upstream:
  name: OpenVEX
  source: "https://github.com/openvex"
  license: CC-BY-4.0
  vendor: OpenSSF
  format_only: true

recommended_trace: "off"

post:
  match:
    any_of:
      - product_glob: ["*.openvex.json", "**/*.openvex.json", "*.vex.json", "**/*.vex.json"]
      - product_glob: ["vex.json", "**/vex.json"]

llm_hints:
  on_match: "OpenVEX document captured. Vulnerability statements preserved for downstream policy."

contract:
  tier: recommended
  predicate_type: https://openvex.dev/ns
  run_type: postproduct
  stability:
    level: versioned-schema
    tool_schema_version: "0.2.0"
    notes: "Attestor reads an existing OpenVEX product file from disk and unmarshals it verbatim into the predicate (VEXDocument), plus the report file path and its digest. Output is deterministic for a given input file; the OpenVEX format itself is a versioned JSON schema (@context https://openvex.dev/ns). Embedded timestamp fields are carried through from the input document, not generated by the attestor."
    volatile_fields: ["vexDocument.timestamp", "vexDocument.last_updated", "vexDocument.statements[].timestamp", "vexDocument.statements[].last_updated", "vexDocument.statements[].action_statement_timestamp"]
  schema_required: true
  credentials: []
  fixtures:
    - name: iam-scan
      role: canonical
