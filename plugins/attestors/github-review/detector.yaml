apiVersion: cilock.detection/v0.1
name: github-review
description: "Snapshots GitHub PR review state for the current commit (or an explicit SHA/PR) via the `gh` CLI."

category: [code-review]

upstream:
  name: GitHub Pull Request Reviews API
  source: "https://docs.github.com/en/rest/pulls/reviews"
  license: commercial
  vendor: GitHub, Inc. / Microsoft

recommended_trace: "off"

# Pre-gate: fires when we're inside a github checkout AND `gh` is on PATH.
# The gh auth (token / `gh auth login`) is required for the API call, but we
# can't probe that without spending network; left to runtime.
pre:
  match:
    all_of:
      - file_exists: ".git/HEAD"
      - any_of:
          - env_set: GITHUB_TOKEN
          - env_set: GH_TOKEN
          - env_set: GITHUB_ACTIONS

llm_hints:
  on_match: "GitHub PR review state captured. Subjects include commit SHA, repo, PR numbers, and every distinct reviewer login. Use policyverify to gate on `state == APPROVED` from required reviewers."
contract:
  tier: extended
  predicate_type: https://aflock.ai/attestations/github-review/v0.1
  run_type: prematerial
  stability:
    level: best-effort
    notes: "Predicate is a point-in-time snapshot of mutable GitHub PR/review state fetched over the REST API. FetchedAt is a wall-clock RFC3339 timestamp set at attest time, and the PRs/reviews captured reflect whatever the resolved token could see at that moment (review counts, states, and reviewer logins change as the PR evolves). The interface (subject prefixes, predicate shape) is stable; the captured values are not reproducible across runs."
    volatile_fields: ["FetchedAt", "PRs", "PRs[].Reviews"]
  subjects:
    - prefix: "commitsha:"
      description: "the target commit SHA reviews were looked up for"
    - prefix: "repo:"
      description: "the owner/name GitHub repository"
    - prefix: "pr:"
      description: "each pull request associated with the commit, keyed pr:<repo>#<number>"
    - prefix: "reviewer:"
      description: "each distinct reviewer login that submitted a review"
  schema_required: true
  credentials:
    - name: github-token
      type: api-token
      provided: env
      env_vars: ["GH_TOKEN", "GITHUB_TOKEN"]
      scopes: ["pull-requests:read"]
      required: false
