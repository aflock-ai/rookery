apiVersion: cilock.detection/v0.1
name: docker-bench
description: "Captures Docker Bench for Security CIS benchmark results."

category: [compliance-scan]

upstream:
  name: Docker Bench for Security
  source: "https://github.com/docker/docker-bench-security"
  license: Apache-2.0
  vendor: Docker, Inc.

recommended_trace: "off"

pre:
  match:
    any_of:
      - argv_prefix: ["docker-bench-security"]
      - argv_prefix: ["docker-bench-security.sh"]

post:
  match:
    any_of:
      - exec_observed:
          argv_prefix: ["docker-bench-security"]
      - exec_observed:
          argv_prefix: ["docker-bench-security.sh"]
      - product_glob: ["docker-bench*.json", "**/docker-bench*.json", "docker-bench*.log", "**/docker-bench*.log"]

llm_hints:
  on_match: "Docker Bench results captured. CIS Docker benchmark outcomes preserved."

contract:
  tier: extended
  predicate_type: https://aflock.ai/attestations/docker-bench/v0.1
  run_type: postproduct
  stability:
    level: best-effort
    notes: >-
      Counts and failed-check rollup are deterministic given a fixed report.
      However the report reflects live host/container state at scan time:
      container names are extracted from the Container Runtime section (tests
      id "5") items and depend on which containers are running, and the
      benchmark version derives from the tool's top-level "dockerbenchsecurity"
      field. Re-running against a changed host yields different container
      subjects and summary counts. report_file is the on-disk product path,
      which differs between the recorded run and a hermetic replay.
    volatile_fields: ["report_file", "container_names", "summary.total_warn", "summary.total_pass", "summary.failed_checks", "summary.score"]
  subjects:
    - prefix: "benchmark:"
      description: "the CIS Docker Benchmark identity (e.g. benchmark:cis-docker@1.3.4), derived from the tool's reported version"
    - prefix: "container:"
      description: "each running container name docker-bench audited in its Container Runtime section (tests id \"5\")"
  schema_required: true
  credentials: []
  fixtures:
    - name: daemon-audit
      role: canonical
