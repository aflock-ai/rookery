apiVersion: cilock.detection/v0.1
name: nessus
description: "Captures Nessus vulnerability scan reports (.nessus XML)."

category: [vulnerability-scan, compliance-scan]
primary_category: vulnerability-scan

upstream:
  name: Nessus
  source: "https://www.tenable.com/products/nessus"
  license: commercial
  vendor: Tenable, Inc.

recommended_trace: "off"

post:
  match:
    product_glob: ["*.nessus", "**/*.nessus"]

llm_hints:
  on_match: "Nessus scan report captured. Hosts, plugin findings, and risk scores preserved."
