apiVersion: cilock.detection/v0.1
name: nessus
description: "Captures Nessus vulnerability scan reports (.nessus XML)."

category: [vulnerability-scan, compliance-scan]
primary_category: vulnerability-scan

upstream:
  name: Nessus
  source: "https://www.tenable.com/products/nessus"
  license: commercial
  vendor: Tenable, Inc.

recommended_trace: "off"

post:
  match:
    product_glob: ["*.nessus", "**/*.nessus"]

llm_hints:
  on_match: "Nessus scan report captured. Hosts, plugin findings, and risk scores preserved."

contract:
  tier: extended
  predicate_type: https://aflock.ai/attestations/nessus/v0.1
  run_type: postproduct
  stability:
    level: best-effort
    notes: >-
      Severity counts (critical/high/medium/low/info) and host/CVE
      subjects are deterministic for a given .nessus input. ScanSummary.topCVEs
      is assembled by iterating a Go map (cveSet), so its element ordering is
      non-deterministic across runs.
    volatile_fields: ["scanSummary.topCVEs"]
  subjects:
    - prefix: "nessus:host:"
      description: "each ReportHost name (hostname or IP) from the scan"
    - prefix: "cve:"
      description: "each CVE id referenced by a critical or high severity (severity >= 3) finding"
  schema_required: true
  credentials: []
