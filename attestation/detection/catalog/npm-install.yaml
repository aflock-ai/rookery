apiVersion: cilock.detection/v0.1
name: npm-install
detection_only: true

description: npm install / npm ci — Node.js dependency resolution + install.

category: [dependency-resolve]

upstream:
  name: npm
  source: "https://github.com/npm/cli"
  license: Artistic-2.0
  vendor: OpenJS Foundation / npm Inc.

recommended_trace: light

pre:
  match:
    any_of:
      - argv_prefix: [npm, install]
      - argv_prefix: [npm, ci]
      - argv_prefix: [npm, i]

llm_hints:
  on_match: npm install/ci observed. lockfiles attestor captures package-lock.json; commandrun captures fetches.
