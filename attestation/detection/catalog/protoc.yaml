apiVersion: cilock.detection/v0.1
name: protoc
detection_only: true

description: Protocol Buffers compiler — generates Go/Java/Python/JS bindings from .proto files. Common in monorepos with API codegen pipelines.

category: [build]

upstream:
  name: Protocol Buffers
  source: "https://github.com/protocolbuffers/protobuf"
  license: BSD-3-Clause
  vendor: Google / Protocol Buffers Authors

recommended_trace: light

pre:
  match:
    any_of:
      - argv_prefix: [protoc]
      - argv_prefix: [buf, generate]

llm_hints:
  on_match: "protoc / buf generate observed. Generated source files appear as products; downstream attestors (go-build, sbom) pick up the binaries/SBOMs that result."
