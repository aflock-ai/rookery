apiVersion: cilock.detection/v0.1
name: go-build
detection_only: true

description: go build — Go compiler. Output binaries carry BuildInfo (module + VCS metadata) which the go-build attestor extracts and writes as a JSON sidecar so the evidence survives strip(1).

category: [build]

upstream:
  name: go build
  source: "https://pkg.go.dev/cmd/go"
  license: BSD-3-Clause
  vendor: Google / Go Authors

recommended_trace: light

pre:
  match:
    any_of:
      - argv_prefix: [go, build]
      - argv_prefix: [go, install]

llm_hints:
  on_match: go build/install observed. The go-build attestor captures BuildInfo (module graph + vcs.revision + build settings) and persists a .gobuild.json sidecar next to each binary so the evidence survives strip(1).
