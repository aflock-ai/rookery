id: kratos-admin
task: Capture the active admin-tier identity list from Kratos for KSI-IAM-AAM (Account Access Management)
ksis: [KSI-IAM-AAM]
nist: [ac-2, ia-12]

# `collect` is run by the recipe driver (cilock) as a commandrun step. The
# produced JSON file is what the structured-data attestor seals.
collect:
  command:
    - kratos
    - list
    - identities
    - --endpoint
    - "{{ .KratosAdminURL }}"
    - --format
    - json
  output: kratos-identities.json

# `attest` is the structured-data attestor configuration. The JSONPath
# subject query selects every identity id; each becomes an in-toto subject
# `kratos:identity:$['identities'][N]['id']` keyed by its canonical-JSON
# digest. policyverify VSAs can then pin the verdict to specific subjects.
attest:
  data-type: kratos-identity-list
  subject-query: "$.identities[*].id"
  subject-prefix: "kratos:identity:"
  embed-data: false
