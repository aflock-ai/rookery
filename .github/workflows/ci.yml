# Rookery CI Pipeline
# Adapted from Judge's comprehensive CI with patterns for Go monorepo
#
# Jobs:
# - go-version-check: Validate .go-version consistency
# - lint-go: golangci-lint + deadcode + govulncheck
# - test-go: Go tests with coverage
# - test-go-race: Go tests with race detector
# - vet: go vet across all modules
# - build: Build all binaries (cilock, builder)
# - verify-isolated: Verify each module builds outside workspace
# - commitlint: Conventional commit validation
# - forbidden-patterns: Scan for dangerous code patterns
# - dep-budget: Block cilock transitive-dep growth beyond .dep-budget.yaml
# - canonical-attestor-audit: Block silent drift between presets/all and the canonical cilock binary
# - provenance-check: Verify .provenance/ inlined-upstream records
# - ci-success: Aggregate status gate

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Version Consistency ──────────────────────────────────────────
  go-version-check:
    name: go version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Go version consistency
        run: |
          EXPECTED=$(cat .go-version | tr -d '[:space:]')
          echo "Expected Go version: $EXPECTED"

          # Check go.work
          WORK_VER=$(head -1 go.work | grep -oP '\d+\.\d+\.\d+' || true)
          if [ -n "$WORK_VER" ] && [ "$WORK_VER" != "$EXPECTED" ]; then
            echo "go.work has $WORK_VER, expected $EXPECTED"
            exit 1
          fi

          # Check all go.mod files
          ERRORS=""
          for mod in $(find . -name 'go.mod' -not -path '*/vendor/*'); do
            MOD_VER=$(grep '^go ' "$mod" | grep -oP '\d+\.\d+\.\d+' || true)
            if [ -n "$MOD_VER" ] && [ "$MOD_VER" != "$EXPECTED" ]; then
              ERRORS="${ERRORS}\n  $mod has $MOD_VER"
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo "Go version mismatch (expected $EXPECTED):$ERRORS"
            exit 1
          fi

          echo "All Go versions consistent: $EXPECTED"

  # ── Linting ─────────────────────────────────────────────────────────
  lint-go:
    name: lint
    uses: ./.github/workflows/_lint-go.yml

  # ── Testing ─────────────────────────────────────────────────────────
  test-go:
    name: test
    uses: ./.github/workflows/_test-go.yml
    with:
      race: false
      coverage: true

  test-go-race:
    name: test (race)
    uses: ./.github/workflows/_test-go.yml
    with:
      race: true

  # ── Static Analysis ─────────────────────────────────────────────────
  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Run go vet
        run: |
          # go.work doesn't support ./... from repo root, iterate workspace members
          for dir in $(grep '^\s*\./' go.work | sed 's/^[[:space:]]*//' | sed 's|^\.\/||'); do
            echo "vetting $dir..."
            (cd "$dir" && go vet ./...) || exit 1
          done
          echo "All modules pass go vet"

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: attestation
            dir: attestation
          - name: builder
            dir: builder
          - name: cilock
            dir: cilock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Build ${{ matrix.target.name }}
        working-directory: ${{ matrix.target.dir }}
        run: go build ./...

  # ── Isolated Module Builds ──────────────────────────────────────────
  verify-isolated:
    name: verify isolated builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Verify each module builds in isolation
        run: make verify-isolated

  # ── go.mod / go.sum tidy drift (advisory) ────────────────────────────
  # The workspace (go.work) resolves every intra-repo module from the local
  # tree, which hides per-module go.mod/go.sum drift. That drift is invisible
  # in workspace mode but breaks any consumer that builds a single module with
  # GOWORK=off + a committed go.sum (e.g. the cilock-action release — the only
  # place it surfaced before, days after the offending merge).
  #
  # ADVISORY for now: main is currently broadly untidy (go.work has masked it),
  # so this reports drift as warnings instead of failing. It flips to blocking
  # (exit on drift) once the dedicated repo-wide `go mod tidy` cleanup lands —
  # that cleanup is kept separate to avoid a 50+-module go.sum rewrite colliding
  # with in-flight PRs.
  mod-tidy-check:
    name: go.mod tidy drift (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Report go mod tidy drift (GOWORK=off)
        run: |
          set -uo pipefail   # deliberately NOT -e: advisory, never fails the job
          drift=0
          while IFS= read -r mod; do
            dir=$(dirname "$mod")
            if ! (cd "$dir" && GOWORK=off go mod tidy) 2>/tmp/tidyerr; then
              echo "::warning file=$dir/go.mod::go mod tidy could not run in $dir (often a missing replace for a transitively-needed sibling module): $(head -1 /tmp/tidyerr)"
              drift=1; continue
            fi
            if ! git diff --quiet -- "$dir/go.mod" "$dir/go.sum"; then
              echo "::warning file=$dir/go.mod::$dir is not tidy — run 'cd $dir && GOWORK=off go mod tidy' and commit the result"
              drift=1
            fi
          done < <(find . -name go.mod -not -path './go.mod' -not -path '*/vendor/*')
          if [ "$drift" -ne 0 ]; then
            echo "::warning::Per-module go.mod/go.sum drift detected (advisory). go.work masks this; it breaks GOWORK=off consumers like the cilock-action release. Flip this check to blocking after the repo-wide tidy cleanup."
          else
            echo "All modules are go mod tidy-clean."
          fi
          # TODO(flip-to-blocking once main is tidy): exit "$drift"

  # ── Downstream consumer build ────────────────────────────────────────
  # cilock-action is the real downstream consumer: it pins every rookery module
  # via replace + a committed go.sum and builds with GOWORK=off — the config
  # that runs only at release time today, so a rookery change that breaks
  # cilock-action's compile is invisible until a release is cut (exactly how
  # the rc15 break slipped through). Build it here against THIS PR's rookery so
  # genuine API/compile breaks fail the PR. go.sum is tidied first (a rookery
  # dep change legitimately drifts the consumer's committed go.sum — that's the
  # consumer's release-time housekeeping, surfaced here as a warning, not a
  # rookery defect), so this gates only on real compile breaks.
  downstream-cilock-action:
    name: downstream cilock-action build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rookery (this PR)
        uses: actions/checkout@v4
        with:
          path: rookery

      - name: Checkout cilock-action (default branch)
        uses: actions/checkout@v4
        with:
          repository: aflock-ai/cilock-action
          path: cilock-action

      - uses: actions/setup-go@v5
        with:
          go-version-file: rookery/.go-version

      - name: Diagnose checkout layout (why commandrun/ebpf replace may not resolve)
        working-directory: cilock-action
        run: |
          echo "pwd: $(pwd)"
          echo "--- siblings of cilock-action ---"; ls -la ..
          echo "--- ebpf module dir on disk? ---"; ls -la ../rookery/plugins/attestors/commandrun/ebpf/ 2>&1 | head
          echo "--- cilock-action go.mod: commandrun/ebpf require + replace ---"; grep -n "commandrun/ebpf" go.mod || echo "NONE"
          echo "--- go env (GOFLAGS/GONOSUMCHECK) ---"; GOWORK=off go env GOFLAGS GONOSUMDB GONOSUMCHECK GOMODCACHE

      - name: Build cilock-action against this rookery
        working-directory: cilock-action
        run: |
          set -euo pipefail
          # Repoint every rookery replace at the ABSOLUTE path of this PR's
          # rookery checkout. cilock-action ships relative `../rookery/...`
          # replaces that assume a specific sibling layout; rewriting them to
          # absolute removes any dependence on checkout-relative resolution
          # (which proved fragile for the nested commandrun/ebpf module on the
          # runner) so the gate tests THIS rookery deterministically.
          R="$(cd "$GITHUB_WORKSPACE/rookery" && pwd)"
          while read -r old; do
            sub="${old#github.com/aflock-ai/rookery}"
            go mod edit -replace="${old}=${R}${sub}"
          done < <(go mod edit -json | jq -r '.Replace[].Old.Path' | grep '^github.com/aflock-ai/rookery')
          # Build with -mod=mod so go.sum entries for *new* external transitive
          # deps are auto-fetched (routine consumer housekeeping, surfaced as a
          # warning); the gate fails only on genuine compile/API breaks. We do
          # NOT `go mod tidy` here — tidy resolves the full test-dep graph,
          # which trips over intra-repo pseudo-versions on paths
          # cmd/cilock-action never imports.
          before=$(sha256sum go.mod go.sum | sha256sum)
          GOWORK=off go build -mod=mod ./cmd/cilock-action
          after=$(sha256sum go.mod go.sum | sha256sum)
          if [ "$before" != "$after" ]; then
            echo "::warning::cilock-action's go.mod/go.sum drifted against this rookery (new transitive dep) — cilock-action must re-tidy before its next release."
          fi
          echo "cilock-action cmd/cilock-action builds against this rookery"

  # ── Builder Smoke ───────────────────────────────────────────────────
  # Runs the integration suite at builder/integration_test.go: builds
  # both stock cilock and a builder-generated cilock, asserts they
  # produce equivalent DSSE envelopes (same payloadType, same key ID
  # for the same RSA key, matching preset attestor set). Guards against
  # regressions in the builder's codegen or in cilock/cli's exported
  # surface — either side breaking would break the manifest-driven
  # custom-binary use case.
  builder-smoke:
    name: builder smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Run builder integration tests
        run: go test -v -tags=integration -timeout 5m ./builder/...

  # ── Conventional Commits ────────────────────────────────────────────
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Conventional commit pattern: type(scope): description
          # Repo-specific type extensions (not in classic CC spec):
          #   security = audit findings, privilege drops, hardening
          #   diag     = telemetry / verifier-log / instrumentation
          #   scripts  = repo helper scripts (matrix runners, etc.)
          # Compound types via '+' (e.g. `security+ci:`) are accepted
          # for commits that legitimately touch two distinct categories.
          TYPES='(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|security|diag|scripts)'
          PATTERN="^${TYPES}([+]${TYPES})?(\(.+\))?: .+"
          ERRORS=""

          for COMMIT in $(git rev-list "$BASE".."$HEAD"); do
            MSG=$(git log -1 --format='%s' "$COMMIT")
            if ! echo "$MSG" | grep -qP "$PATTERN"; then
              # Allow merge commits and Co-Authored-By
              if ! echo "$MSG" | grep -qP '^Merge '; then
                ERRORS="${ERRORS}\n  ${COMMIT:0:8}: $MSG"
              fi
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo "Non-conventional commits found:$ERRORS"
            echo ""
            echo "Expected format: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

          echo "All commits follow conventional format"

  # ── Forbidden Patterns ──────────────────────────────────────────────
  forbidden-patterns:
    name: forbidden patterns
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for forbidden patterns
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          ERRORS=""

          # File-aware diff scanning: track current file to properly
          # exclude test files and main.go from os.Exit/panic checks
          CURRENT_FILE=""
          while IFS= read -r line; do
            # Track current file from diff headers
            if [[ "$line" == "+++ b/"* ]]; then
              CURRENT_FILE="${line#+++ b/}"
              continue
            fi

            # Skip vendored / security-patched upstream code — the
            # scan targets first-party patterns, not upstream API
            # decisions (e.g. wk8 ordered-map's invalidOption panic).
            case "$CURRENT_FILE" in
              security-patches/*|vendor/*) continue ;;
            esac

            # Only check added lines
            [[ "$line" == "+"* ]] || continue
            [[ "$line" == "+++"* ]] && continue
            ADDED="${line#+}"

            # Skip comments and string literals (lines containing quotes)
            TRIMMED=$(echo "$ADDED" | sed 's/^[[:space:]]*//')
            [[ "$TRIMMED" == "//"* ]] && continue

            IS_TEST=false
            IS_MAIN=false
            [[ "$CURRENT_FILE" == *"_test.go" ]] && IS_TEST=true
            [[ "$(basename "$CURRENT_FILE")" == "main.go" ]] && IS_MAIN=true

            # os.Exit outside main.go and test files
            if [[ "$IS_TEST" == false && "$IS_MAIN" == false ]]; then
              if echo "$ADDED" | grep -q 'os\.Exit('; then
                ERRORS="${ERRORS}\n  os.Exit() in $CURRENT_FILE: $TRIMMED"
              fi
            fi

            # panic outside test files and init functions
            if [[ "$IS_TEST" == false ]]; then
              if echo "$ADDED" | grep -q '\bpanic('; then
                if ! echo "$ADDED" | grep -q 'func init('; then
                  ERRORS="${ERRORS}\n  panic() in $CURRENT_FILE: $TRIMMED"
                fi
              fi
            fi

            # //nolint without specific linter
            if echo "$ADDED" | grep -q '//nolint' && ! echo "$ADDED" | grep -q '//nolint:'; then
              ERRORS="${ERRORS}\n  //nolint without linter in $CURRENT_FILE: $TRIMMED"
            fi

            # Hardcoded credentials (skip test files and examples)
            if [[ "$IS_TEST" == false ]]; then
              if echo "$ADDED" | grep -iqP '(password|secret|token|apikey)\s*[:=]\s*"[^"]{8,}"'; then
                if ! echo "$ADDED" | grep -qi 'example'; then
                  ERRORS="${ERRORS}\n  Possible credential in $CURRENT_FILE: $TRIMMED"
                fi
              fi
            fi
          done < <(git diff "$BASE"..HEAD -- '*.go' || true)

          if [ -n "$ERRORS" ]; then
            echo "Forbidden patterns detected:$ERRORS"
            exit 1
          fi

          echo "No forbidden patterns found"

  # ── Dependency Budget Guardrail ─────────────────────────────────────
  # Fails the PR if the default cilock binary's transitive dep count or
  # go.sum byte size grows beyond .dep-budget.yaml. To raise a ceiling,
  # update the same file in the same PR — that surfaces the new deps in
  # review instead of letting them silently accumulate.
  #
  # Tracking issue: https://github.com/aflock-ai/rookery/issues/70
  dep-budget:
    name: dep budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Check cilock dep budget
        run: ./scripts/check-dep-budget.sh

  # ── Canonical-vs-preset attestor drift ──────────────────────────────
  # Fails if presets/all/imports.go declares an attestor that the
  # canonical cilock binary doesn't blank-import, unless the attestor is
  # on the documented EXCLUDED list in the script. Forces every drift
  # to be a conscious decision.
  #
  # Tracking issue: https://github.com/aflock-ai/rookery/issues/146
  canonical-attestor-audit:
    name: canonical attestor audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify canonical cilock blank-imports cover presets/all
        run: ./scripts/check-canonical-attestors.sh

  # ── Provenance / License Audit ──────────────────────────────────────
  # Verifies every .provenance/*.json entry: local file matches recorded
  # SHA256, upstream content (re-fetched at the recorded commit) still
  # matches, license is on the NOTICE.md allowlist, and any "// inlined
  # from" comments in Go files are covered by an entry.
  #
  # Tracking issue: https://github.com/aflock-ai/rookery/issues/72
  provenance-check:
    name: provenance check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify .provenance/ entries
        run: ./scripts/check-provenance.sh

  # ── CI Success Gate ─────────────────────────────────────────────────
  ci-success:
    name: ci success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - go-version-check
      - lint-go
      - test-go
      - test-go-race
      - vet
      - build
      - verify-isolated
      - mod-tidy-check
      - downstream-cilock-action
      - builder-smoke
      - commitlint
      - forbidden-patterns
      - dep-budget
      - canonical-attestor-audit
      - provenance-check
    steps:
      - name: Check all jobs
        run: |
          RESULTS='${{ toJson(needs) }}'
          echo "Job results:"
          echo "$RESULTS" | jq -r 'to_entries[] | "  \(.key): \(.value.result)"'

          # Check for failures (skip skipped jobs like commitlint on push)
          FAILED=$(echo "$RESULTS" | jq -r 'to_entries[] | select(.value.result == "failure") | .key')

          if [ -n "$FAILED" ]; then
            echo ""
            echo "Failed jobs:"
            echo "$FAILED"
            exit 1
          fi

          echo ""
          echo "All required checks passed"
