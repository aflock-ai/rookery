# Rookery Release Pipeline
# Builds CIlock using Chainguard toolset (melange + apko)
#
# Produces:
# - Multi-platform static binaries (linux x amd64/arm64)
# - Minimal container image via apko (ghcr.io/aflock-ai/cilock)
# - Cosign signatures on all artifacts
# - SPDX SBOMs via syft
# - GitHub Release with checksums
# - macOS/Windows cross-compiled binaries

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # For cosign OIDC keyless signing

jobs:
  # ── Build static binaries for all platforms ─────────────────────────
  build-binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows excluded — omnitrail attestor has linux/darwin-only build constraints
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install syft
        # syft generates the SPDX SBOM that the cilock-action sbom attestor
        # parses into the in-envelope sbom/v0.1 predicate. Must be installed
        # BEFORE cilock-action runs so the wrapped command can invoke it.
        uses: anchore/sbom-action/download-syft@v0

      # Dogfood: every release-build step is wrapped by cilock-action.
      # Records signed attestations (environment/git/github/commandrun/product/sbom)
      # for the go build, signs them keyless via public Sigstore Fulcio with the
      # workflow's GitHub Actions OIDC identity, and timestamps via the public
      # Sigstore TSA. No platform / Archivista dependency — the attestation
      # bundle is written to a file and shipped with the GitHub Release.
      #
      # End users verify by:
      #   cilock verify --policy release-v1.policy.json <attestation.json>
      # which checks the Fulcio cert chain + workflow identity in the policy.
      - name: Attest release-build with cilock-action
        # NOTE: cilock-action ref must be a tag, not a SHA. The action's
        # binary download URL is constructed from the ref as
        #   /releases/download/v<ref>/cilock-action_linux_amd64.tar.gz
        # so SHA pinning 404s. Verified live in
        # aflock-ai/supply-chain-attacks#1. Pin to a specific tag instead.
        uses: aflock-ai/cilock-action@v1.0.1
        with:
          step: release-build-${{ matrix.goos }}-${{ matrix.goarch }}
          # Note: registered attestor name is `command-run` (hyphen),
          # not `commandrun`. --trace is OFF until rookery#152 / PR
          # #153 lands (the product attestor's trace filter drops
          # atomic-rename outputs like `go build`'s binary).
          #
          # `sbom` is ON: the wrapped command (below) invokes syft to
          # write an SPDX file into the workingdir; cilock-action's
          # product attestor captures it, then the sbom attestor parses
          # it into an sbom/v0.1 predicate that lives in the same
          # signed envelope as the rest of the build evidence.
          attestations: "environment git github product sbom"
          outfile: dist/${{ matrix.goos }}-${{ matrix.goarch }}.attestation.json
          enable-sigstore: "true"
          enable-archivista: "false"
          fulcio-url: "https://fulcio.sigstore.dev"
          fulcio-oidc-client-id: "sigstore"
          fulcio-oidc-issuer: "https://token.actions.githubusercontent.com"
          timestamp-servers: "https://timestamp.sigstore.dev/api/v1/timestamp"
          # Hash the output binary as the product subject so verification can
          # match the attestation to the artifact downloaded by end users.
          hashes: "sha256"
          # IMPORTANT for the product attestor:
          #   1. workingdir must contain the output binary (so the attestor
          #      sees it after the command runs)
          #   2. cilock-action's default product-include-glob is `*` which
          #      ONLY matches root-level filenames in workingdir, not paths
          #      with slashes. Writing to ./dist/cilock would be invisible
          #      to product capture even with workingdir=.
          # Solution: workingdir at repo root + binary output at repo root,
          # then a follow-up step moves it to dist/ for archival.
          workingdir: .
          command: |
            # Write the binary to a name that DOESN'T collide with the
            # existing cilock/ source directory. Using a per-platform
            # filename also avoids name reuse across matrix legs if
            # cilock-action ever runs them in shared workspace.
            BINARY="cilock-bin-${{ matrix.goos }}-${{ matrix.goarch }}"
            cd cilock
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOWORK=off \
              go build \
                -trimpath \
                -ldflags="-s -w -X 'github.com/aflock-ai/rookery/cilock/cli.Version=${{ steps.version.outputs.version }}'" \
                -o "../${BINARY}" \
                ./cmd/cilock/
            cd ..
            # Generate an SBOM from the built Go binary — captures the
            # actual modules linked into the artifact (the wire-truth),
            # not just whatever's in the source tree. Lands at workingdir
            # root so cilock-action's product attestor + sbom attestor
            # pick it up into the signed envelope.
            syft "${BINARY}" -o spdx-json="${BINARY}.sbom.spdx.json"

      - name: Create archive
        run: |
          # Rename the platform-unique binary (used to dodge the cilock/
          # directory collision during cilock-action's product capture)
          # back to plain 'cilock' / 'cilock.exe' for the archive that
          # end users download.
          mkdir -p dist
          SRC="cilock-bin-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv "${SRC}" dist/cilock.exe
          else
            mv "${SRC}" dist/cilock
          fi
          cd dist
          ARCHIVE="cilock-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" cilock.exe
          else
            tar czf "${ARCHIVE}.tar.gz" cilock
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cilock-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/cilock-*
            dist/${{ matrix.goos }}-${{ matrix.goarch }}.attestation.json

  # ── Build container image with melange + apko ───────────────────────
  # NOTE: The melange signing key is ephemeral — generated fresh each run.
  # This is acceptable for RC/release images since the apk signature is
  # only used during the apko build and is not a trust anchor for consumers.
  # Container image integrity is provided by cosign keyless signing below.
  build-image:
    name: build container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install melange
        run: |
          # Use --strip-components=1 to handle the nested directory structure
          # (tarball contains melange_VERSION_OS_ARCH/melange)
          MELANGE_VERSION=$(curl -fsS https://api.github.com/repos/chainguard-dev/melange/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -fsL "https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_VERSION}/melange_${MELANGE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xzf - --strip-components=1 -C /usr/local/bin
          melange version

      - name: Install apko
        run: |
          # Same nested directory structure as melange
          APKO_VERSION=$(curl -fsS https://api.github.com/repos/chainguard-dev/apko/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -fsL "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xzf - --strip-components=1 -C /usr/local/bin
          apko version

      - name: Install QEMU for multi-arch
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-user-static bubblewrap

      - name: Generate melange signing key
        working-directory: deploy/cilock
        run: melange keygen melange.rsa

      - name: Build melange package
        working-directory: deploy/cilock
        run: |
          # Recent melange dropped the --substitution flag (was deprecated in
          # favor of --vars-file). For a single substitution like the package
          # version, the simplest fix is to envsubst the YAML before invoking
          # melange so the resulting file is fully resolved.
          export CILOCK_VERSION="${{ steps.version.outputs.version }}"
          envsubst < melange.yaml > melange-resolved.yaml
          sudo melange build melange-resolved.yaml \
            --arch x86_64,aarch64 \
            --signing-key melange.rsa \
            --out-dir ./packages \
            --env-file "" \
            --source-dir ../../

      - name: Build apko image
        working-directory: deploy/cilock
        run: |
          apko build apko.yaml \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }} \
            cilock.tar \
            --arch x86_64,aarch64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        run: |
          # Load and push multi-arch image
          docker load -i deploy/cilock/cilock.tar

          # Tag with version and latest
          docker tag ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}
          docker tag ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }} \
            ghcr.io/aflock-ai/cilock:latest

          docker push ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}
          docker push ghcr.io/aflock-ai/cilock:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    # Release binaries even if the container image build fails.
    # The container image is a convenience artifact — binaries are primary.
    if: ${{ always() && needs.build-binaries.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum cilock-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate SBOM
        run: |
          syft dir:. --output spdx-json=dist/cilock-${{ steps.version.outputs.version }}-sbom.spdx.json

      # ── Policy gate ────────────────────────────────────────────────────
      # Verify each platform binary against the release policy BEFORE any
      # cosign signature is produced. Cosign signatures are the public-
      # facing trust anchor users actually check; they should be a
      # *consequence* of policy success, not parallel to it. If policy
      # fails for any platform, the whole job exits and no signed
      # artifacts are published.
      - name: Download bootstrap cilock for VSA generation
        run: |
          # Use the just-built linux-amd64 binary as the bootstrap cilock for
          # this release's own verification. Same source as the artifacts it
          # verifies.
          tar -xzf dist/cilock-${{ steps.version.outputs.version }}-linux-amd64.tar.gz -C /tmp/
          chmod +x /tmp/cilock
          /tmp/cilock --version

      - name: Verify policy + generate VSA for each platform
        working-directory: dist
        run: |
          for archive in cilock-*-linux-amd64.tar.gz cilock-*-linux-arm64.tar.gz \
                         cilock-*-darwin-amd64.tar.gz cilock-*-darwin-arm64.tar.gz; do
            [ -f "$archive" ] || continue
            stem="${archive%.tar.gz}"
            /tmp/cilock verify \
              --policy ../deploy/cilock/release.policy.json \
              --artifactfile "$archive" \
              --vsa-out "${stem}.vsa.json" \
              || { echo "POLICY FAILED for $archive — aborting release before cosign signature"; exit 1; }
          done
          echo "✔ All platforms passed release policy. Proceeding to cosign signature."

      # ── Cosign signing (gated on policy pass above) ─────────────────────
      # Only runs after every platform's VSA generation succeeded. Public
      # users that subsequently `cosign verify-blob` against these archives
      # are transitively trusting the policy result, not just bytes-on-disk.
      - name: Sign all artifacts with cosign (policy-gated)
        working-directory: dist
        run: |
          for artifact in cilock-*.tar.gz cilock-*.zip checksums-sha256.txt; do
            [ -f "$artifact" ] || continue
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done

      - name: Publish install script + signed release policy
        run: |
          cp ../deploy/cilock/install.sh dist/install.sh
          # Sign install.sh with the same OIDC identity end users will check.
          cosign sign-blob --yes \
            --output-signature dist/install.sh.sig \
            --output-certificate dist/install.sh.cert \
            dist/install.sh
          cp ../deploy/cilock/release.policy.json dist/release-v1.policy.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cilock-*.tar.gz
            dist/cilock-*.zip
            dist/cilock-*.sig
            dist/cilock-*.pem
            dist/checksums-sha256.txt
            dist/checksums-sha256.txt.sig
            dist/checksums-sha256.txt.pem
            dist/cilock-*-sbom.spdx.json
            dist/*.attestation.json
            dist/cilock-*.vsa.json
            dist/install.sh
            dist/install.sh.sig
            dist/install.sh.cert
            dist/release-v1.policy.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
