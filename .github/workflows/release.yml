# Rookery Release Pipeline
# Builds CIlock using Chainguard toolset (melange + apko)
#
# Produces:
# - Multi-platform static binaries (linux x amd64/arm64)
# - Minimal container image via apko (ghcr.io/aflock-ai/cilock)
# - Cosign signatures on all artifacts
# - SPDX SBOMs via syft
# - GitHub Release with checksums
# - macOS/Windows cross-compiled binaries

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # For cosign OIDC keyless signing

jobs:
  # ── Build static binaries for all platforms ─────────────────────────
  build-binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows excluded — omnitrail attestor has linux/darwin-only build constraints
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        working-directory: cilock
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOWORK: "off"
        run: |
          BINARY="cilock"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="cilock.exe"
          fi

          go build \
            -trimpath \
            -ldflags="-s -w -X 'github.com/aflock-ai/rookery/cilock/internal/cmd.Version=${{ steps.version.outputs.version }}'" \
            -o "../dist/${BINARY}" \
            ./cmd/cilock/

      - name: Create archive
        run: |
          cd dist
          ARCHIVE="cilock-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" cilock.exe
          else
            tar czf "${ARCHIVE}.tar.gz" cilock
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cilock-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cilock-*

  # ── Build container image with melange + apko ───────────────────────
  build-image:
    name: build container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install melange
        run: |
          MELANGE_VERSION=$(curl -sS https://api.github.com/repos/chainguard-dev/melange/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSLo /tmp/melange.tar.gz "https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_VERSION}/melange_${MELANGE_VERSION}_linux_amd64.tar.gz"
          mkdir -p /tmp/melange-extract
          tar -xzf /tmp/melange.tar.gz -C /tmp/melange-extract
          sudo cp "$(find /tmp/melange-extract -name melange -type f | head -1)" /usr/local/bin/melange
          sudo chmod +x /usr/local/bin/melange
          melange version

      - name: Install apko
        run: |
          APKO_VERSION=$(curl -sS https://api.github.com/repos/chainguard-dev/apko/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSLo /tmp/apko.tar.gz "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz"
          mkdir -p /tmp/apko-extract
          tar -xzf /tmp/apko.tar.gz -C /tmp/apko-extract
          sudo cp "$(find /tmp/apko-extract -name apko -type f | head -1)" /usr/local/bin/apko
          sudo chmod +x /usr/local/bin/apko
          apko version

      - name: Install QEMU for multi-arch
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-user-static bubblewrap

      - name: Generate melange signing key
        working-directory: deploy/cilock
        run: melange keygen melange.rsa

      - name: Build melange package
        working-directory: deploy/cilock
        run: |
          sudo melange build melange.yaml \
            --arch x86_64,aarch64 \
            --signing-key melange.rsa \
            --out-dir ./packages \
            --env-file "" \
            --source-dir ../../ \
            --substitution "CILOCK_VERSION=${{ steps.version.outputs.version }}"

      - name: Build apko image
        working-directory: deploy/cilock
        run: |
          apko build apko.yaml \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }} \
            cilock.tar \
            --arch x86_64,aarch64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        run: |
          # Load and push multi-arch image
          docker load -i deploy/cilock/cilock.tar

          # Tag with version and latest
          docker tag ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}
          docker tag ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }} \
            ghcr.io/aflock-ai/cilock:latest

          docker push ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}
          docker push ghcr.io/aflock-ai/cilock:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum cilock-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Sign all artifacts with cosign
        working-directory: dist
        run: |
          for artifact in cilock-*.tar.gz cilock-*.zip checksums-sha256.txt; do
            [ -f "$artifact" ] || continue
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done

      - name: Generate SBOM
        run: |
          syft dir:. --output spdx-json=dist/cilock-${{ steps.version.outputs.version }}-sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cilock-*.tar.gz
            dist/cilock-*.zip
            dist/cilock-*.sig
            dist/cilock-*.pem
            dist/checksums-sha256.txt
            dist/checksums-sha256.txt.sig
            dist/checksums-sha256.txt.pem
            dist/cilock-*-sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
