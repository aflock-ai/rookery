# Rookery Release Pipeline
# Builds CIlock using Chainguard toolset (melange + apko)
#
# Produces:
# - Multi-platform static binaries (linux x amd64/arm64)
# - Minimal container image via apko (ghcr.io/aflock-ai/cilock)
# - Cosign signatures on all artifacts
# - SPDX SBOMs via syft
# - GitHub Release with checksums
# - macOS/Windows cross-compiled binaries

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # For keyless OIDC signing (platform Fulcio + GHCR cosign)

env:
  # Platform-trust pivot: cilock release artifacts are signed against the
  # TestifySec Platform (its keyless Fulcio + TSA), NOT public Sigstore.
  # cilock derives the Fulcio (/api/v2/signingCert), TSA (/api/v1/timestamp),
  # and Archivista URLs from this single --platform-url; the GitHub Actions
  # ambient OIDC identity (id-token: write) is exchanged at the platform's
  # Fulcio (audience 'sigstore', issuer token.actions.githubusercontent.com)
  # for the ephemeral signing cert. Staging-first; flip to the prod platform
  # URL once it proxies /api/v2/signingCert + /api/v1/timestamp externally,
  # and refresh deploy/cilock/platform-fulcio-*.pem + the release policy in
  # lockstep.
  PLATFORM_URL: https://platform.aws-sandbox-staging.testifysec.dev

jobs:
  # ── Build static binaries for all platforms ─────────────────────────
  build-binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows excluded — omnitrail attestor has linux/darwin-only build constraints
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Bake the PLATFORM policy-signing trust into every cilock we build here
      # (bootstrap + the shipped matrix binary). This makes `cilock verify`
      # trust the platform-signed release-v1.policy.json with NO --policy-*
      # flags: the embedded trust pins WHO MAY SIGN A POLICY (the TestifySec
      # Platform Root CA + the release.yml workflow identity), while attestation
      # trust still comes from the policy itself. The committed
      # internal/embeddedtrust/trust.json default is `{}`, so only the binaries
      # built in this workflow embed trust — stock/dev cilock is unchanged.
      #
      # Roots come from the committed PEMs (deploy/cilock/platform-fulcio-root.pem
      # and platform-tsa-root.pem), which are the TestifySec Platform Root CA
      # fetched from /api/v1/fulcio/trustbundle (Fulcio leaf + TSA both chain to
      # it). Refresh those PEMs + this bake if the platform root rotates.
      - name: Bake platform policy trust into the release cilock
        run: |
          set -euo pipefail
          jq -n \
            --rawfile fulcio deploy/cilock/platform-fulcio-root.pem \
            --rawfile tsa    deploy/cilock/platform-tsa-root.pem \
            '{
              roots: [
                {name:"testifysec-platform-fulcio", kind:"FULCIO_ROOT", pem:$fulcio},
                {name:"testifysec-platform-tsa",    kind:"TSA_ROOT",    pem:$tsa}
              ],
              policy_signers: [
                {type:"root", certConstraint:{
                  commonname:"", dnsnames:[], emails:[], organizations:[],
                  uris:["*"], roots:["testifysec-platform-fulcio"],
                  extensions:{
                    Issuer:"https://token.actions.githubusercontent.com",
                    SourceRepositoryURI:"https://github.com/aflock-ai/rookery",
                    BuildConfigURI:"https://github.com/aflock-ai/rookery/.github/workflows/release.yml@*"
                  }
                }}
              ],
              policy_timestamp_roots: ["testifysec-platform-tsa"]
            }' > cilock/internal/embeddedtrust/trust.json
          echo "baked trust.json ($(wc -c < cilock/internal/embeddedtrust/trust.json) bytes)"

      # Dogfood: self-attest each release build with the cilock we are RELEASING.
      # Build a bootstrap cilock (native to this runner), then use it to wrap the
      # cross-compiled `go build`, recording signed attestations
      # (environment/git/github/command-run/product) and signing them keyless via
      # the TestifySec Platform's own Fulcio (derived from --platform-url) using
      # the workflow's GitHub Actions ambient OIDC identity, timestamped by the
      # platform's TSA. The attestation is written to a file and shipped with the
      # Release (no Archivista upload here — a raw workflow identity maps to no
      # tenant, so the dogfood path stays sign-only / offline-publishable).
      #
      # End users verify with the published, platform-rooted policy:
      #   cilock verify <artifact> -p release-v1.policy.json -a <attestation.json>
      # which checks the platform Fulcio cert chain + the workflow OIDC identity.
      - name: Build bootstrap cilock (to self-attest the release)
        working-directory: cilock
        run: |
          CGO_ENABLED=0 GOWORK=off go build -trimpath \
            -ldflags="-s -w -X 'github.com/aflock-ai/rookery/cilock/cli.Version=${{ steps.version.outputs.version }}'" \
            -o /tmp/cilock-bootstrap ./cmd/cilock/
          /tmp/cilock-bootstrap version

      - name: Attest release build with cilock (dogfood, platform keyless Fulcio)
        id: attest
        # continue-on-error keeps the release flowing if keyless attestation has a
        # transient issue; the fallback below then produces the binary unsigned.
        continue-on-error: true
        working-directory: cilock
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOWORK: "off"
        # Minimal flags: --platform-url is the single trust anchor. cilock
        # derives the platform Fulcio (/api/v2/signingCert) + TSA
        # (/api/v1/timestamp), detects the ambient GitHub Actions OIDC identity
        # (ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN from `id-token: write`), mints a
        # fresh OIDC token (audience 'sigstore', issuer
        # token.actions.githubusercontent.com), and presents it to the platform
        # Fulcio for the ephemeral signing cert. No manual token fetch, no
        # --signer-fulcio-*/--timestamp-servers pins — they all flow from the
        # platform URL. The minted token is never written to a step output/env,
        # so the environment attestor can't capture it.
        run: |
          BINARY="cilock"; [ "${{ matrix.goos }}" = "windows" ] && BINARY="cilock.exe"
          /tmp/cilock-bootstrap run \
            --step "release-build-${{ matrix.goos }}-${{ matrix.goarch }}" \
            --workload manual \
            --platform-url "${PLATFORM_URL}" \
            -a environment,git,github \
            --hashes sha256 \
            -o "../dist/${{ matrix.goos }}-${{ matrix.goarch }}.attestation.json" \
            -- go build -trimpath \
                 -ldflags="-s -w -X 'github.com/aflock-ai/rookery/cilock/cli.Version=${{ steps.version.outputs.version }}'" \
                 -o "../dist/${BINARY}" ./cmd/cilock/

      - name: Fallback build (no attestation) if attest step failed
        # Runs only when the dogfood attestation above failed. Produces the binary
        # so the release can proceed; the attestation file simply won't exist.
        if: steps.attest.outcome == 'failure'
        working-directory: cilock
        run: |
          BINARY="cilock"; [ "${{ matrix.goos }}" = "windows" ] && BINARY="cilock.exe"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOWORK=off \
            go build -trimpath \
              -ldflags="-s -w -X 'github.com/aflock-ai/rookery/cilock/cli.Version=${{ steps.version.outputs.version }}'" \
              -o "../dist/${BINARY}" ./cmd/cilock/
          echo "::warning::cilock self-attestation failed; release binary built without a signed attestation"

      - name: Create archive
        run: |
          cd dist
          ARCHIVE="cilock-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" cilock.exe
          else
            tar czf "${ARCHIVE}.tar.gz" cilock
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cilock-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/cilock-*
            dist/${{ matrix.goos }}-${{ matrix.goarch }}.attestation.json
          # Attestation file may be absent when cilock-action self-
          # attestation failed and we fell back to a plain build.
          # Don't fail the upload on a missing optional file.
          if-no-files-found: warn

  # ── Build container image with melange + apko ───────────────────────
  # NOTE: The melange signing key is ephemeral — generated fresh each run.
  # This is acceptable for RC/release images since the apk signature is
  # only used during the apko build and is not a trust anchor for consumers.
  # Container image integrity is provided by cosign keyless signing below.
  build-image:
    name: build container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install melange
        run: |
          # Use --strip-components=1 to handle the nested directory structure
          # (tarball contains melange_VERSION_OS_ARCH/melange)
          MELANGE_VERSION=$(curl -fsS https://api.github.com/repos/chainguard-dev/melange/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -fsL "https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_VERSION}/melange_${MELANGE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xzf - --strip-components=1 -C /usr/local/bin
          melange version

      - name: Install apko
        run: |
          # Same nested directory structure as melange
          APKO_VERSION=$(curl -fsS https://api.github.com/repos/chainguard-dev/apko/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -fsL "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xzf - --strip-components=1 -C /usr/local/bin
          apko version

      - name: Install QEMU for multi-arch
        run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-user-static bubblewrap

      - name: Generate melange signing key
        working-directory: deploy/cilock
        run: melange keygen melange.rsa

      - name: Build melange package
        working-directory: deploy/cilock
        run: |
          # melange has no --substitution flag (removed in current versions) and
          # does not expand shell-style ${CILOCK_VERSION}. Inject the release
          # version straight into package.version, then build.
          sed -i "s|\${CILOCK_VERSION}|${{ steps.version.outputs.version }}|g" melange.yaml
          sudo melange build melange.yaml \
            --arch x86_64,aarch64 \
            --signing-key melange.rsa \
            --out-dir ./packages \
            --source-dir ../../

      - name: Build apko image
        working-directory: deploy/cilock
        run: |
          apko build apko.yaml \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }} \
            cilock.tar \
            --arch x86_64,aarch64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        run: |
          # Load and push multi-arch image
          docker load -i deploy/cilock/cilock.tar

          # Tag with version and latest
          docker tag ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}-amd64 \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}
          docker tag ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }} \
            ghcr.io/aflock-ai/cilock:latest

          docker push ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}
          docker push ghcr.io/aflock-ai/cilock:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # NOTE (platform-trust pivot): the OCI image is still signed keyless
      # against PUBLIC Sigstore cosign. The image is a convenience artifact —
      # the release binaries (signed against the TestifySec Platform Fulcio,
      # see the `release` job) are primary. Re-anchoring registry signing on the
      # platform Fulcio needs a custom cosign Sigstore SigningConfig/TUF root
      # (cilock signs files/blobs, not registry references), which is a separate
      # workstream; deferred to keep this pivot's moving parts minimal.
      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/aflock-ai/cilock:${{ steps.version.outputs.version }}

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    # Release binaries even if the container image build fails.
    # The container image is a convenience artifact — binaries are primary.
    if: ${{ always() && needs.build-binaries.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # Use the just-built linux-amd64 binary as cilock for this release's own
      # blob signing AND verification — same source as the artifacts it signs
      # and verifies. Extracted before signing so a single cilock serves both.
      - name: Stage release cilock
        run: |
          tar -xzf dist/cilock-${{ steps.version.outputs.version }}-linux-amd64.tar.gz -C /tmp/
          chmod +x /tmp/cilock
          /tmp/cilock version

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum cilock-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Sign the release verification policy (platform keyless)
        # cilock verify requires the policy to be a SIGNED DSSE envelope whose
        # signature chains to trusted policy-signing roots. Sign the committed
        # release.policy.json with cilock against the platform Fulcio + TSA using
        # the workflow OIDC identity — the exact identity the embedded trust (and
        # release-v1.policy's functionary) pins. The signed copy ships as
        # release-v1.policy.json; the unsigned committed copy stays reviewer-
        # readable in deploy/cilock/. Exported as SIGNED_POLICY for the VSA gate.
        working-directory: dist
        run: |
          set -euo pipefail
          /tmp/cilock sign \
            --platform-url "${PLATFORM_URL}" \
            --infile ../deploy/cilock/release.policy.json \
            --outfile release-v1.policy.json
          echo "SIGNED_POLICY=$(pwd)/release-v1.policy.json" >> "$GITHUB_ENV"

      # Platform-trust pivot: sign the release blobs (tarballs, zips, checksums)
      # with cilock against the TestifySec Platform's keyless Fulcio + TSA — NOT
      # public Sigstore cosign. cilock derives both from --platform-url and signs
      # with the workflow's ambient GitHub Actions OIDC identity (id-token:
      # write). Each blob gets a detached DSSE envelope (.dsse.json) wrapping its
      # bytes, signed by the same platform-issued ephemeral cert end users trust
      # via release-v1.policy.json. The primary, flagless trust artifact is still
      # the per-platform .attestation.json + VSA verified by `cilock verify`;
      # these blob envelopes are a convenience integrity layer over the archives.
      - name: Sign release blobs with cilock (platform keyless)
        # Fail CLOSED: a release must not publish a binary/checksums file without
        # its platform-signed DSSE envelope. If signing fails, the whole release
        # fails rather than silently shipping unsigned artifacts.
        working-directory: dist
        run: |
          for artifact in cilock-*.tar.gz cilock-*.zip checksums-sha256.txt; do
            [ -f "$artifact" ] || continue
            /tmp/cilock sign \
              --platform-url "${PLATFORM_URL}" \
              --infile "$artifact" \
              --outfile "${artifact}.dsse.json" \
              || { echo "::error::cilock blob signing failed for $artifact"; exit 1; }
          done

      - name: Generate SBOM
        run: |
          syft dir:. --output spdx-json=dist/cilock-${{ steps.version.outputs.version }}-sbom.spdx.json

      # Fail-closed verify-then-publish gate. A binary is published ONLY if it
      # carries a platform-signed attestation that PASSES `cilock verify` against
      # the signed release policy, and `cilock verify` writes the per-artifact VSA
      # that ships with the release. This is the publisher-side guarantee
      # install.sh's trust model depends on (independent client-side verification
      # is a tracked fast-follow). The staged cilock embeds the platform
      # policy-signing trust (baked in build-binaries), so no --policy-* flags are
      # needed: it checks the policy's own signature AND the per-platform
      # attestation chain flaglessly.
      - name: Verify every release binary against the signed policy (publish gate)
        # Fail CLOSED: a missing expected archive, a missing attestation, or a
        # failed verification ABORTS the release rather than shipping an
        # unverifiable binary. A missing attestation means the keyless dogfood
        # attestation fell back to a plain build — re-run the release; we do not
        # publish a binary that cannot be verified against the policy. (If you
        # want RC-tolerance instead, exclude the unattested archive from the
        # upload — do NOT relax this gate to a warning, or install.sh's
        # "publisher only uploads verified artifacts" claim becomes false.)
        working-directory: dist
        run: |
          set -euo pipefail
          for archive in cilock-*-linux-amd64.tar.gz cilock-*-linux-arm64.tar.gz \
                         cilock-*-darwin-amd64.tar.gz cilock-*-darwin-arm64.tar.gz; do
            if [ ! -f "$archive" ]; then
              echo "::error::expected release archive ${archive} is missing — refusing to publish an incomplete release"
              exit 1
            fi
            stem="${archive%.tar.gz}"
            platform="${archive#cilock-*-}"; platform="${platform%.tar.gz}"
            attest="${platform}.attestation.json"
            if [ ! -f "$attest" ]; then
              echo "::error::no attestation for ${archive} — refusing to publish an unverifiable binary (keyless attestation must have failed; re-run the release)"
              exit 1
            fi
            echo "verifying ${archive} against the signed release policy..."
            /tmp/cilock verify \
              --policy "${SIGNED_POLICY}" \
              --artifactfile "$archive" \
              --attestations "$attest" \
              --vsa-out "${stem}.vsa.json" \
              || { echo "::error::policy verification FAILED for ${archive} — refusing to publish"; exit 1; }
          done

      - name: Publish install script
        working-directory: dist
        run: |
          cp ../deploy/cilock/install.sh install.sh
          # Sign install.sh with cilock against the platform keyless Fulcio + TSA
          # — the same workflow OIDC identity end users check via the release
          # policy. Detached DSSE envelope (install.sh.dsse.json). Fail CLOSED:
          # the installer must ship with its signature, not silently unsigned.
          /tmp/cilock sign \
            --platform-url "${PLATFORM_URL}" \
            --infile install.sh \
            --outfile install.sh.dsse.json \
            || { echo "::error::cilock signing of install.sh failed"; exit 1; }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cilock-*.tar.gz
            dist/cilock-*.zip
            dist/cilock-*.tar.gz.dsse.json
            dist/cilock-*.zip.dsse.json
            dist/checksums-sha256.txt
            dist/checksums-sha256.txt.dsse.json
            dist/cilock-*-sbom.spdx.json
            dist/*.attestation.json
            dist/cilock-*.vsa.json
            dist/install.sh
            dist/install.sh.dsse.json
            dist/release-v1.policy.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
