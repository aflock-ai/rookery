# Weekly security vulnerability scan
# Adapted from Judge's cron-security.yml

name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 0'  # Sundays at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  govulncheck:
    name: vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          echo "Scanning for known vulnerabilities..."
          govulncheck -json ./... > vulns.json 2>&1 || true

          # Extract vulnerability IDs
          VULN_IDS=$(jq -r '.osv // empty | .id // empty' vulns.json 2>/dev/null | sort -u || true)

          if [ -z "$VULN_IDS" ]; then
            echo "No vulnerabilities found"
            exit 0
          fi

          echo "Vulnerabilities found:"
          echo "$VULN_IDS"

          # Create or update issues for each vulnerability
          for VID in $VULN_IDS; do
            EXISTING=$(gh issue list --label "security" --search "$VID" --json number --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "Security: $VID" \
                --body "Detected by govulncheck. See https://pkg.go.dev/vuln/$VID" \
                --label "security"
            else
              gh issue comment "$EXISTING" --body "Still detected by govulncheck ($(date -u +%Y-%m-%d))"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
