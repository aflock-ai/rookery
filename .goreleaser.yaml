# GoReleaser configuration for CIlock
# Adapted from Witness's release pipeline with cosign signing and SBOM generation

project_name: cilock

builds:
  - id: cilock
    dir: cilock
    main: ./cmd/cilock/
    binary: cilock
    ldflags:
      - "-s -w"
      - "-extldflags=-zrelro"
      - "-extldflags=-znow"
      - "-X 'github.com/aflock-ai/rookery/cilock/internal/cmd.Version={{.Tag}}-{{.ShortCommit}}'"
    env:
      - "CGO_ENABLED=0"
      - "GOWORK=off"
      - "GOFLAGS=-trimpath"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

gomod:
  proxy: false

source:
  enabled: true

signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    signature: '${artifact}.sig'
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - '--output-certificate=${certificate}'
      - "${artifact}"
      - "--yes"
    artifacts: all

changelog:
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Documentation'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  prerelease: auto
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"

kos:
  - id: cilock
    build: cilock
    repository: ghcr.io/aflock-ai/cilock
    tags:
      - '{{.Version}}'
    bare: true
    preserve_import_paths: false
    creation_time: '{{.CommitTimestamp}}'
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: spdx

docker_signs:
  - artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "${artifact}"
      - "--yes"

sboms:
  - id: archive
    cmd: syft
    artifacts: archive
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: source
    cmd: syft
    artifacts: source
    args: ["$artifact", "--output", "spdx-json=$document"]
